<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdEarn - Watch Ads & Earn USDT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* ===== MODERN STYLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: slideUp 0.3s ease;
            position: relative;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        header {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .back-btn {
            display: inline-block;
            padding: 8px 16px;
            background: #6c757d;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 15px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .back-btn:hover {
            background: #5a6268;
            transform: translateX(-3px);
        }

        .user-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 24px;
            border-radius: 20px;
            margin-bottom: 24px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .balance {
            font-size: 2.8rem;
            font-weight: bold;
            margin: 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 24px 0;
        }

        .stat-box {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            transition: transform 0.3s;
        }

        .stat-box:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: bold;
            color: #333;
            display: block;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 12px 0;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .ad-container {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
            text-align: center;
            border: 3px dashed #ddd;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .ad-icon {
            font-size: 5rem;
            margin: 20px 0;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #ddd;
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }

        .notice {
            background: #e3f2fd;
            padding: 16px;
            border-radius: 12px;
            margin: 20px 0;
            color: #1976d2;
            text-align: center;
            border-left: 4px solid #1976d2;
        }

        .loading-spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 24px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            animation: modalSlide 0.3s;
        }

        @keyframes modalSlide {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div id="app" class="container">
        <!-- Content loaded dynamically -->
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="modal">
        <div class="modal-content">
            <div class="modal-icon">✅</div>
            <h2>Success!</h2>
            <p id="successMessage"></p>
            <button onclick="closeModal()" class="btn btn-primary">Continue</button>
        </div>
    </div>

    <script>
        // ===== SIMPLE USER DATA (saved in browser) =====
        let userData = {
            id: null,
            username: "User",
            first_name: "User",
            balance: 0.00015, // Starting with some balance for demo
            totalAds: 27,
            todayAds: 3,
            weeklyAds: 12
        };

        // ===== INITIALIZE =====
        document.addEventListener('DOMContentLoaded', function() {
            console.log('App starting...');
            
            // Try to get Telegram user info
            try {
                if (typeof Telegram !== 'undefined') {
                    const tg = Telegram.WebApp;
                    tg.expand();
                    console.log('Telegram WebApp expanded');
                    
                    if (tg.initDataUnsafe?.user) {
                        userData.id = tg.initDataUnsafe.user.id;
                        userData.first_name = tg.initDataUnsafe.user.first_name || "User";
                        userData.username = tg.initDataUnsafe.user.username || "User";
                        console.log('Telegram user:', userData.first_name);
                    }
                }
            } catch (e) {
                console.log('Not in Telegram or error:', e);
            }
            
            // Load saved data from localStorage
            const saved = localStorage.getItem('adEarnUser');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    userData = { ...userData, ...data };
                    console.log('Loaded saved data');
                } catch (e) {
                    console.error('Error loading saved data:', e);
                }
            }
            
            // Show home page
            showHomePage();
        });

        // ===== SAVE DATA =====
        function saveData() {
            try {
                localStorage.setItem('adEarnUser', JSON.stringify(userData));
                console.log('Data saved');
            } catch (e) {
                console.error('Error saving data:', e);
            }
        }

        // ===== HOME PAGE =====
        function showHomePage() {
            document.getElementById('app').innerHTML = `
                <header>
                    <h1>🤑 AdEarn</h1>
                    <p>Watch ads & earn USDT!</p>
                </header>

                <div class="user-card">
                    <h3>Your Balance</h3>
                    <div class="balance">${userData.balance.toFixed(5)} USDT</div>
                    <p>Welcome, ${userData.first_name}!</p>
                </div>

                <div class="stats">
                    <div class="stat-box">
                        <span class="stat-label">Today</span>
                        <span class="stat-value">${userData.todayAds}</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">Total</span>
                        <span class="stat-value">${userData.totalAds}</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">Weekly</span>
                        <span class="stat-value">${userData.weeklyAds}</span>
                    </div>
                </div>

                <button onclick="showWatchPage()" class="btn btn-primary">
                    📺 Watch Ads & Earn 0.00005 USDT
                </button>

                <button onclick="showComingSoon()" class="btn btn-success">
                    📋 Tasks (Coming Soon)
                </button>

                <button onclick="showComingSoon()" class="btn btn-secondary">
                    👥 Refer (Coming Soon)
                </button>

                <div class="notice">
                    <p><strong>✅ App Loaded Successfully!</strong></p>
                    <p>User ID: ${userData.id || 'Not in Telegram'}</p>
                    <p>Data saved in your browser (localStorage)</p>
                </div>
            `;
        }

        // ===== WATCH PAGE =====
        function showWatchPage() {
            document.getElementById('app').innerHTML = `
                <header>
                    <a href="#" onclick="showHomePage(); return false;" class="back-btn">← Back</a>
                    <h1>📺 Watch Ads</h1>
                    <p>Earn 0.00005 USDT per ad</p>
                </header>

                <div class="ad-container" id="adContainer">
                    <div class="ad-icon">📱</div>
                    <h2>Ready to earn?</h2>
                    <p>Click the button below</p>
                </div>

                <button onclick="watchAd()" class="btn btn-primary" id="watchBtn">
                    ▶️ Watch Ad (3 seconds)
                </button>

                <div class="stats">
                    <div class="stat-box">
                        <span class="stat-label">Balance</span>
                        <span class="stat-value">${userData.balance.toFixed(5)}</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">Today</span>
                        <span class="stat-value">${userData.todayAds}</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">Earned Today</span>
                        <span class="stat-value">${(userData.todayAds * 0.00005).toFixed(5)}</span>
                    </div>
                </div>
            `;
        }

        // ===== WATCH AD FUNCTION =====
        function watchAd() {
            const btn = document.getElementById('watchBtn');
            const container = document.getElementById('adContainer');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Watching...';
            
            container.innerHTML = `
                <div class="ad-icon">⏳</div>
                <h2>Ad Playing</h2>
                <p>Please wait 3 seconds...</p>
                <div class="progress-bar">
                    <div id="progress" class="progress-fill" style="width: 0%"></div>
                </div>
            `;
            
            let seconds = 0;
            const interval = setInterval(() => {
                seconds++;
                const progress = document.getElementById('progress');
                if (progress) {
                    progress.style.width = (seconds / 3) * 100 + '%';
                }
                
                if (seconds >= 3) {
                    clearInterval(interval);
                    
                    // Add reward
                    userData.balance += 0.00005;
                    userData.todayAds++;
                    userData.totalAds++;
                    userData.weeklyAds++;
                    
                    // Save to localStorage
                    saveData();
                    
                    container.innerHTML = `
                        <div class="ad-icon">🎉</div>
                        <h2>Ad Complete!</h2>
                        <p>✅ You earned 0.00005 USDT</p>
                        <p>New balance: ${userData.balance.toFixed(5)} USDT</p>
                    `;
                    
                    btn.disabled = false;
                    btn.innerHTML = '▶️ Watch Another Ad';
                    
                    // Update stats in background
                    setTimeout(() => {
                        if (document.getElementById('watchBtn')) {
                            showWatchPage();
                        }
                    }, 2000);
                }
            }, 1000);
        }

        // ===== COMING SOON =====
        function showComingSoon() {
            showSuccess('This feature is coming soon!');
        }

        // ===== MODAL FUNCTIONS =====
        function showSuccess(message) {
            document.getElementById('successMessage').innerHTML = message;
            document.getElementById('successModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('successModal').style.display = 'none';
        }

        // ===== MAKE FUNCTIONS GLOBAL =====
        window.showHomePage = showHomePage;
        window.showWatchPage = showWatchPage;
        window.watchAd = watchAd;
        window.showComingSoon = showComingSoon;
        window.closeModal = closeModal;
    </script>
</body>
</html>
