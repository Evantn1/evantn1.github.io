<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdEarn - Watch Ads & Earn USDT</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Adexora Ads SDK -->
    <script src="https://adexora.com/cdn/ads.js?id=1729"></script>
    
    <style>
        /* ===== MODERN STYLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: slideUp 0.3s ease;
            position: relative;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        header {
            text-align: center;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        h1 {
            font-size: 2.2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .back-btn {
            display: inline-block;
            padding: 8px 16px;
            background: #6c757d;
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 15px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .back-btn:hover {
            background: #5a6268;
            transform: translateX(-3px);
        }

        .user-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 24px;
            border-radius: 20px;
            margin-bottom: 24px;
            text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .balance {
            font-size: 2.8rem;
            font-weight: bold;
            margin: 10px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 24px 0;
        }

        .stat-box {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 16px;
            text-align: center;
            transition: transform 0.3s;
        }

        .stat-box:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: bold;
            color: #333;
            display: block;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 12px 0;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, #ffc107, #fd7e14);
            color: white;
        }

        .btn-info {
            background: linear-gradient(135deg, #17a2b8, #138496);
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .ad-container {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
            text-align: center;
            border: 3px dashed #ddd;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .ad-icon {
            font-size: 5rem;
            margin: 20px 0;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #ddd;
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }

        .notice {
            background: #e3f2fd;
            padding: 16px;
            border-radius: 12px;
            margin: 20px 0;
            color: #1976d2;
            text-align: center;
            border-left: 4px solid #1976d2;
        }

        .warning {
            background: #fff3cd;
            color: #856404;
            border-left: 4px solid #ffc107;
        }

        .loading-spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .amount-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        .amount-btn {
            padding: 15px;
            text-align: center;
            background: #f8f9fa;
            border-radius: 12px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
            font-weight: 500;
        }

        .amount-btn:hover {
            border-color: #667eea;
            background: white;
        }

        .amount-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        input {
            width: 100%;
            padding: 16px;
            border: 2px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            margin: 10px 0;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 24px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            animation: modalSlide 0.3s;
        }

        @keyframes modalSlide {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .adexora-badge {
            background: #e3f2fd;
            border: 2px solid #2196f3;
            border-radius: 12px;
            padding: 12px;
            margin: 10px 0;
            text-align: center;
            font-size: 0.9rem;
            color: #1976d2;
        }
    </style>
</head>
<body>
    <div id="app" class="container">
        <!-- Content loaded dynamically -->
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="modal">
        <div class="modal-content">
            <div class="modal-icon">✅</div>
            <h2>Success!</h2>
            <p id="successMessage"></p>
            <button onclick="closeModal()" class="btn btn-primary">Continue</button>
        </div>
    </div>

    <!-- Error Modal -->
    <div id="errorModal" class="modal">
        <div class="modal-content">
            <div class="modal-icon">❌</div>
            <h2>Error</h2>
            <p id="errorMessage"></p>
            <button onclick="closeModal()" class="btn btn-secondary">Close</button>
        </div>
    </div>

    <script>
        // ===== CONFIGURATION =====
        const CONFIG = {
            AD_REWARD: 0.00005,
            DAILY_REWARD: 0.0002,
            MIN_WITHDRAWAL: 0.015,
            WITHDRAWAL_FEE: 0.001,
            ADMIN_BOT_TOKEN: "8332036966:AAGixJckzC9j2nXmR_6INIdhJDF2b2j9WgY",
            ADMIN_CHAT_ID: "6450016040",
            BOT_USERNAME: "earnmoneyapppbot"
        };

        // ===== USER DATA =====
        let userData = {
            id: null,
            username: "User",
            first_name: "User",
            balance: 0.00015,
            totalAds: 27,
            todayAds: 3,
            weeklyAds: 12,
            polygonAddress: ""
        };

        // ===== INITIALIZE =====
        document.addEventListener('DOMContentLoaded', function() {
            console.log('App starting...');
            
            // Get Telegram user
            try {
                if (typeof Telegram !== 'undefined') {
                    const tg = Telegram.WebApp;
                    tg.expand();
                    
                    if (tg.initDataUnsafe?.user) {
                        userData.id = tg.initDataUnsafe.user.id;
                        userData.first_name = tg.initDataUnsafe.user.first_name || "User";
                        userData.username = tg.initDataUnsafe.user.username || "User";
                    }
                }
            } catch (e) {}
            
            // Load saved data
            const saved = localStorage.getItem('adEarnUser');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    userData = { ...userData, ...data };
                } catch (e) {}
            }
            
            showHomePage();
        });

        function saveData() {
            localStorage.setItem('adEarnUser', JSON.stringify(userData));
        }

        // ===== HOME PAGE =====
        function showHomePage() {
            document.getElementById('app').innerHTML = `
                <header>
                    <h1>🤑 AdEarn</h1>
                    <p>Watch real ads & earn USDT!</p>
                </header>

                <div class="user-card">
                    <h3>Your Balance</h3>
                    <div class="balance">${userData.balance.toFixed(5)} USDT</div>
                    <p>Welcome, ${userData.first_name}!</p>
                </div>

                <div class="stats">
                    <div class="stat-box">
                        <span class="stat-label">Today</span>
                        <span class="stat-value">${userData.todayAds}</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">Total</span>
                        <span class="stat-value">${userData.totalAds}</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">Weekly</span>
                        <span class="stat-value">${userData.weeklyAds}</span>
                    </div>
                </div>

                <button onclick="showWatchPage()" class="btn btn-primary">
                    📺 Watch Real Ads (${CONFIG.AD_REWARD} USDT)
                </button>

                <button onclick="showWithdrawPage()" class="btn btn-success">
                    💸 Withdraw USDT
                </button>

                <div class="adexora-badge">
                    <strong>✅ Adexora Ads Ready</strong><br>
                    Watch real ads and earn!
                </div>

                <div class="notice">
                    <p><strong>💰 Min Withdrawal:</strong> ${CONFIG.MIN_WITHDRAWAL} USDT • Fee: ${CONFIG.WITHDRAWAL_FEE} USDT</p>
                </div>
            `;
        }

        // ===== WATCH PAGE =====
        function showWatchPage() {
            document.getElementById('app').innerHTML = `
                <header>
                    <a href="#" onclick="showHomePage(); return false;" class="back-btn">← Back</a>
                    <h1>📺 Watch Real Ads</h1>
                    <p>Earn ${CONFIG.AD_REWARD} USDT per ad</p>
                </header>

                <div class="ad-container" id="adContainer">
                    <div class="ad-icon">📱</div>
                    <h2>Ready to earn?</h2>
                    <p>Click the button below to watch a real ad</p>
                </div>

                <button onclick="startRealAd()" class="btn btn-primary" id="watchBtn">
                    ▶️ Watch Ad & Earn ${CONFIG.AD_REWARD} USDT
                </button>

                <div class="stats">
                    <div class="stat-box">
                        <span class="stat-label">Balance</span>
                        <span class="stat-value">${userData.balance.toFixed(5)}</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">Today</span>
                        <span class="stat-value">${userData.todayAds}</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">Earned Today</span>
                        <span class="stat-value">${(userData.todayAds * CONFIG.AD_REWARD).toFixed(5)}</span>
                    </div>
                </div>
            `;
        }

        // ===== REAL AD FUNCTION (Adexora) =====
        async function startRealAd() {
            const btn = document.getElementById('watchBtn');
            const container = document.getElementById('adContainer');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Loading Ad...';
            
            container.innerHTML = `
                <div class="ad-icon">⏳</div>
                <h2>Loading ad...</h2>
                <p>Please wait</p>
            `;

            try {
                // Check if Adexora is loaded
                if (typeof window.showAdexora !== 'function') {
                    throw new Error('Adexora not loaded - using test ad');
                }

                container.innerHTML = `
                    <div class="ad-icon">🎬</div>
                    <h2>Ad Started!</h2>
                    <p>Please watch the entire ad...</p>
                `;

                // Show real Adexora ad
                await window.showAdexora();
                
                console.log('✅ Ad completed successfully');
                
                // Add reward
                userData.balance += CONFIG.AD_REWARD;
                userData.totalAds++;
                userData.todayAds++;
                userData.weeklyAds++;
                saveData();
                
                container.innerHTML = `
                    <div class="ad-icon">🎉</div>
                    <h2>Ad Complete!</h2>
                    <p>✅ You earned ${CONFIG.AD_REWARD} USDT</p>
                    <p>New balance: ${userData.balance.toFixed(5)} USDT</p>
                `;
                
                btn.disabled = false;
                btn.innerHTML = '▶️ Watch Another Ad';
                
            } catch (error) {
                console.error('Ad error:', error);
                
                // Fallback to test ad if real ad fails
                container.innerHTML = `
                    <div class="ad-icon">⚠️</div>
                    <h2>Using Test Ad</h2>
                    <p>Real ad unavailable - using test mode</p>
                    <div class="progress-bar">
                        <div id="progress" class="progress-fill" style="width: 0%"></div>
                    </div>
                `;
                
                let seconds = 0;
                const interval = setInterval(() => {
                    seconds++;
                    const progress = document.getElementById('progress');
                    if (progress) {
                        progress.style.width = (seconds / 3) * 100 + '%';
                    }
                    
                    if (seconds >= 3) {
                        clearInterval(interval);
                        
                        userData.balance += CONFIG.AD_REWARD;
                        userData.totalAds++;
                        userData.todayAds++;
                        userData.weeklyAds++;
                        saveData();
                        
                        container.innerHTML = `
                            <div class="ad-icon">🎉</div>
                            <h2>Test Ad Complete!</h2>
                            <p>✅ You earned ${CONFIG.AD_REWARD} USDT</p>
                            <p>New balance: ${userData.balance.toFixed(5)} USDT</p>
                        `;
                        
                        btn.disabled = false;
                        btn.innerHTML = '▶️ Watch Another Ad';
                    }
                }, 1000);
            }
        }

        // ===== WITHDRAW PAGE =====
        function showWithdrawPage() {
            document.getElementById('app').innerHTML = `
                <header>
                    <a href="#" onclick="showHomePage(); return false;" class="back-btn">← Back</a>
                    <h1>💸 Withdraw USDT</h1>
                    <p>Withdraw to Polygon network</p>
                </header>

                <div class="notice warning">
                    <p>Min withdrawal: ${CONFIG.MIN_WITHDRAWAL} USDT • Fee: ${CONFIG.WITHDRAWAL_FEE} USDT</p>
                    <p>Your balance: ${userData.balance.toFixed(5)} USDT</p>
                </div>

                <div class="amount-options">
                    <div class="amount-btn" onclick="setAmount(0.015)">0.015</div>
                    <div class="amount-btn" onclick="setAmount(0.03)">0.03</div>
                    <div class="amount-btn" onclick="setAmount(0.05)">0.05</div>
                    <div class="amount-btn" onclick="setAmount(0.10)">0.10</div>
                    <div class="amount-btn" onclick="setAmount(0.50)">0.50</div>
                    <div class="amount-btn" onclick="setAmount(1.00)">1.00</div>
                </div>

                <input type="text" id="walletAddress" placeholder="Polygon address (0x...)" value="${userData.polygonAddress || ''}">
                <input type="number" id="withdrawAmount" value="${CONFIG.MIN_WITHDRAWAL}" min="${CONFIG.MIN_WITHDRAWAL}" max="${userData.balance}" step="0.001">

                <div class="notice" style="margin: 20px 0;">
                    <div style="display: flex; justify-content: space-between; margin: 10px 0;">
                        <span>Amount:</span>
                        <strong id="amountDisplay">${CONFIG.MIN_WITHDRAWAL} USDT</strong>
                    </div>
                    <div style="display: flex; justify-content: space-between; color: #666;">
                        <span>Fee:</span>
                        <strong>-${CONFIG.WITHDRAWAL_FEE} USDT</strong>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 2px solid #ddd;">
                        <span><strong>You receive:</strong></span>
                        <strong style="color: #28a745;" id="receiveAmount">${(CONFIG.MIN_WITHDRAWAL - CONFIG.WITHDRAWAL_FEE).toFixed(3)} USDT</strong>
                    </div>
                </div>

                <button onclick="processWithdrawal()" class="btn btn-success" id="withdrawBtn">
                    💸 Withdraw Now
                </button>
            `;

            document.getElementById('withdrawAmount').addEventListener('input', updateWithdrawInfo);
        }

        function setAmount(amount) {
            document.getElementById('withdrawAmount').value = amount;
            updateWithdrawInfo();
        }

        function updateWithdrawInfo() {
            const amount = parseFloat(document.getElementById('withdrawAmount').value) || 0;
            document.getElementById('amountDisplay').textContent = amount.toFixed(3) + ' USDT';
            document.getElementById('receiveAmount').textContent = (amount - CONFIG.WITHDRAWAL_FEE).toFixed(3) + ' USDT';
        }

        async function processWithdrawal() {
            const address = document.getElementById('walletAddress').value.trim();
            const amount = parseFloat(document.getElementById('withdrawAmount').value);

            if (!address || !address.startsWith('0x') || address.length !== 42) {
                showError('Invalid Polygon address');
                return;
            }

            if (amount < CONFIG.MIN_WITHDRAWAL || amount > userData.balance) {
                showError('Invalid amount');
                return;
            }

            // Save address
            userData.polygonAddress = address;
            
            // Send to your bot: 8332036966:AAGixJckzC9j2nXmR_6INIdhJDF2b2j9WgY
            const message = `
🚀 *NEW WITHDRAWAL REQUEST!*
👤 *User:* ${userData.first_name} (@${userData.username})
🆔 *ID:* ${userData.id || 'Unknown'}
💰 *Amount:* ${amount.toFixed(5)} USDT
💸 *Net:* ${(amount - CONFIG.WITHDRAWAL_FEE).toFixed(5)} USDT
📤 *Wallet:* \`${address}\`
📊 *Balance:* ${userData.balance.toFixed(5)} USDT
⏰ *Time:* ${new Date().toLocaleString()}
            `;

            try {
                // Send to Telegram
                await fetch(`https://api.telegram.org/bot${CONFIG.ADMIN_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: CONFIG.ADMIN_CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });
                
                // Deduct from user balance
                userData.balance -= amount;
                saveData();
                
                showSuccess('✅ Withdrawal requested! The admin will send your USDT within 24 hours.');
                setTimeout(() => showHomePage(), 2000);
                
            } catch (error) {
                console.error('Error:', error);
                showError('Failed to process withdrawal. Please try again.');
            }
        }

        // ===== MODAL FUNCTIONS =====
        function showSuccess(message) {
            document.getElementById('successMessage').innerHTML = message;
            document.getElementById('successModal').style.display = 'flex';
        }

        function showError(message) {
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('errorModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('successModal').style.display = 'none';
            document.getElementById('errorModal').style.display = 'none';
        }

        // ===== MAKE FUNCTIONS GLOBAL =====
        window.showHomePage = showHomePage;
        window.showWatchPage = showWatchPage;
        window.startRealAd = startRealAd;
        window.showWithdrawPage = showWithdrawPage;
        window.setAmount = setAmount;
        window.processWithdrawal = processWithdrawal;
        window.closeModal = closeModal;
    </script>
</body>
</html>
