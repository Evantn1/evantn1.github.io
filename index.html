<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        /* ===== MODERN STYLES ===== */

            box-sizing: border-box;

        header {

        .back-btn {

        .user-card {

        .btn {

        .telegram-btn {

        /* ===== REFERRAL STYLES ===== */
        .referral-stats {

        .referral-box {

        .referral-box .number {

        .copy-btn {

        .friend-list {

        }

        .friend-item {
            display: flex;

            padding: 12px;
            background: #f8f9fa;

        .friend-avatar {

        /* ===== LEADERBOARD STYLES ===== */
        .leaderboard-item {

        .amount-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);

        .amount-btn {

        }

        .amount-btn.active {

            color: white;
            border-color: #667eea;
        }

        input, textarea {
            width: 100%;
            padding: 16px;
            border: 2px solid #ddd;
            border-radius: 12px;

        }

        }

        textarea {
            resize: none;

        .notice {
            background: #e3f2fd;

        }

        .success-notice {
            background: #d4edda;

            border-left: 4px solid #28a745;

        .warning {

            color: #856404;

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;

            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 24px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            animation: modalSlide 0.3s;
        }

        @keyframes modalSlide {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }

        .modal-icon {

        }

        .loading-spinner {

        }

        @keyframes spin {

            100% { transform: rotate(360deg); }

        .adexora-badge {
            background: #e3f2fd;
            border: 2px solid #2196f3;
            border-radius: 12px;
            padding: 12px;
            margin: 10px 0;
            text-align: center;
            font-size: 0.9rem;
            color: #1976d2;
        }
    </style>
</head>
<body>
    <div id="app" class="container">
        <!-- Content loaded dynamically -->
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="modal">
        <div class="modal-content">
            <div class="modal-icon">✅</div>
            <h2>Success!</h2>
            <p id="successMessage"></p>
            <button onclick="closeModal()" class="btn btn-primary">Continue</button>
        </div>
    </div>

    <!-- Error Modal -->
    <div id="errorModal" class="modal">
        <div class="modal-content">
            <div class="modal-icon">❌</div>
            <h2>Error</h2>
            <p id="errorMessage"></p>
            <button onclick="closeModal()" class="btn btn-secondary">Close</button>
        </div>
    </div>

    <!-- Daily Reward Modal -->
    <div id="dailyRewardModal" class="modal">
        <div class="modal-content">
            <div class="modal-icon">🎁</div>
            <h2>Daily Reward</h2>
            <p id="dailyRewardMessage"></p>
            <button onclick="watchAdForDailyReward()" class="btn btn-success" id="watchAdForDailyBtn">Watch Ad to Claim 0.0002 USDT</button>
            <button onclick="closeModal()" class="btn btn-secondary" style="margin-top: 10px;">Maybe Later</button>
        </div>
    </div>

    <!-- Ad Reward Modal -->
    <div id="adRewardModal" class="modal">
        <div class="modal-content">
            <div class="modal-icon">📺</div>
            <h2>Watch Ad to Claim Reward</h2>
            <p id="adRewardMessage"></p>
            <div id="adRewardContainer" style="min-height: 100px; margin: 20px 0;"></div>
            <button onclick="startRewardAd()" class="btn btn-primary" id="startRewardAdBtn">▶️ Watch Ad Now</button>
            <button onclick="closeAdRewardModal()" class="btn btn-secondary" style="margin-top: 10px;">Cancel</button>
        </div>
    </div>

    <script>
        // ===== CONFIGURATION =====
        const CONFIG = {
            AD_REWARD: 0.00005,
            DAILY_REWARD: 0.0002,
            TASK_REWARD: 0.0003,
            REFERRAL_REWARD: 0.0001,
            MIN_WITHDRAWAL: 0.015,
            WITHDRAWAL_FEE: 0.001,
            WEEKLY_PRIZES: [0.5, 0.3, 0.1],
            ADMIN_BOT_TOKEN: "8332036966:AAGixJckzC9j2nXmR_6INIdhJDF2b2j9WgY",
            ADMIN_CHAT_ID: "6450016040",
            BOT_USERNAME: "earnmoneyapppbot",
            TASK_CHANNEL: "adwatch2"
        };

        // ===== LANGUAGE TRANSLATIONS =====
        const LANGUAGES = {
            en: {
                appName: "AdEarn",
                appDesc: "Watch ads & earn USDT!",
                balance: "Balance",
                welcome: "Welcome",
                todayAds: "Today",
                totalAds: "Total",
                weeklyAds: "Weekly",
                watchAds: "📺 Watch Ads",
                refer: "👥 Refer & Earn",
                leaderboard: "🏆 Leaderboard",
                withdraw: "💸 Withdraw",
                tasks: "📋 Tasks",
                dailyReward: "Daily",
                dailyAvailable: "🎁 Daily reward available!",
                dailyAmount: "💰 {amount} USDT",
                dailyStreak: "🔥 Streak: {streak} days",
                claimNow: "Claim {amount} USDT",
                watchAdToClaim: "Watch ad to claim!"
            }
        };

        let currentLang = 'en';
        let pendingRewardAction = null;

        function t(key, replacements = {}) {
            let text = LANGUAGES.en[key] || key;
            for (const [placeholder, value] of Object.entries(replacements)) {
                text = text.replace(`{${placeholder}}`, value);
            }
            return text;
        }

        function showLanguageSelector() {
            return `
                <div class="language-selector">
                    <button class="lang-btn active" onclick="setLanguage('en')">🇬🇧 EN</button>
                </div>
            `;
        }

        function setLanguage(langCode) {
            currentLang = langCode;
            refreshCurrentPage();
        }

        // ===== USER DATA =====
        let userData = {
            id: null,
            username: "User",
            first_name: "User",
            balance: 0.00015,
            totalAds: 27,
            todayAds: 3,
            weeklyAds: 12,
            polygonAddress: "",
            lastDailyClaim: null,
            dailyStreak: 0,
            referralCode: null,
            referrals: [],
            referralEarnings: 0,
            referredBy: null,
            completedTasks: []
        };

        // ===== INITIALIZE =====
        document.addEventListener('DOMContentLoaded', function() {
            // Get Telegram user
            try {
                if (typeof Telegram !== 'undefined') {
                    const tg = Telegram.WebApp;
                    tg.expand();
                    
                    if (tg.initDataUnsafe?.user) {
                        userData.id = tg.initDataUnsafe.user.id;
                        userData.first_name = tg.initDataUnsafe.user.first_name || "User";
                        userData.username = tg.initDataUnsafe.user.username || "User";
                    }
                }
            } catch (e) {}
            
            // Generate referral code if not exists
            if (!userData.referralCode) {
                userData.referralCode = generateReferralCode();
            }
            
            // Load saved data
            loadData();
            showHomePage();
        });

        function loadData() {
            const saved = localStorage.getItem('adEarnUser');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    userData = { ...userData, ...data };
                } catch (e) {}
            }
        }

        function saveData() {
            localStorage.setItem('adEarnUser', JSON.stringify(userData));
        }

        function generateReferralCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = '';
            for (let i = 0; i < 8; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }

        // ===== DAILY REWARD FUNCTIONS =====
        function checkDailyReward() {
            if (!userData.lastDailyClaim) return true;
            const lastClaim = new Date(userData.lastDailyClaim);
            const now = new Date();
            const hoursSince = (now - lastClaim) / (1000 * 60 * 60);
            return hoursSince >= 24;
        }

        function getDailyRewardStatus() {
            if (!userData.lastDailyClaim) return 'available';
            const lastClaim = new Date(userData.lastDailyClaim);
            const now = new Date();
            const hoursSince = (now - lastClaim) / (1000 * 60 * 60);
            if (hoursSince >= 24) return 'available';
            const hoursLeft = 24 - hoursSince;
            return { status: 'claimed', hoursLeft };
        }

        function showDailyRewardModal() {
            const status = getDailyRewardStatus();
            
            if (status === 'available') {
                document.getElementById('dailyRewardMessage').innerHTML = 
                    `🎁 Daily reward available!<br><br>` +
                    `💰 ${CONFIG.DAILY_REWARD} USDT<br>` +
                    `🔥 Streak: ${userData.dailyStreak || 0} days<br><br>` +
                    `<strong>Watch an ad to claim!</strong>`;
                document.getElementById('watchAdForDailyBtn').style.display = 'block';
            } else {
                document.getElementById('dailyRewardMessage').innerHTML = 
                    `⏳ Already claimed<br><br>` +
                    `Next in ${Math.ceil(status.hoursLeft)} hours<br>` +
                    `🔥 Streak: ${userData.dailyStreak || 0} days`;
                document.getElementById('watchAdForDailyBtn').style.display = 'none';
            }
            
            document.getElementById('dailyRewardModal').style.display = 'flex';
        }

        function watchAdForDailyReward() {
            closeModal();
            showAdRewardModal('daily', 'Watch an ad to claim your daily reward!');
        }

        function processDailyReward() {
            const now = new Date();
            let newStreak = 1;
            
            if (userData.lastDailyClaim) {
                const lastClaim = new Date(userData.lastDailyClaim);
                const hoursSince = (now - lastClaim) / (1000 * 60 * 60);
                newStreak = hoursSince < 48 ? (userData.dailyStreak || 0) + 1 : 1;
            }
            
            userData.balance += CONFIG.DAILY_REWARD;
            userData.lastDailyClaim = now.toISOString();
            userData.dailyStreak = newStreak;
            saveData();
            
            showSuccess(`✅ Daily reward claimed! +${CONFIG.DAILY_REWARD} USDT<br>🔥 Streak: ${newStreak} days`);
            showHomePage();
        }

        // ===== TASK FUNCTIONS =====
        function showTasksPage() {
            const isTaskCompleted = userData.completedTasks && userData.completedTasks.includes('telegram_join');
            
            document.getElementById('app').innerHTML = `
                <header>
                    <a href="#" onclick="showHomePage(); return false;" class="back-btn">← Back</a>
                    <h1>📋 Complete Tasks</h1>
                    <p>Earn extra rewards</p>
                    ${showLanguageSelector()}
                </header>

                <div class="task-container">
                    <div class="task-card">
                        <div class="task-icon">🔥</div>
                        <div class="task-title">SPECIAL TASK</div>
                        <div class="task-reward">${CONFIG.TASK_REWARD} USDT</div>
                        
                        <div class="task-requirements">

        function verifyTask() {
            if (userData.completedTasks?.includes('telegram_join')) {
                showError('Already completed');

            showAdRewardModal('task', 'Watch an ad to claim your task reward!');
        }

        function processTaskReward() {
            if (!userData.completedTasks) userData.completedTasks = [];
            userData.completedTasks.push('telegram_join');
            userData.balance += CONFIG.TASK_REWARD;
            saveData();
            
            showSuccess(`✅ Task complete! +${CONFIG.TASK_REWARD} USDT`);
            showTasksPage();
        }

        // ===== REFERRAL FUNCTIONS =====
        function showReferralPage() {
            document.getElementById('app').innerHTML = `
                <header>
                    <a href="#" onclick="showHomePage(); return false;" class="back-btn">← Back</a>
                    <h1>👥 Refer & Earn</h1>
                    <p>Invite friends</p>

                </header>

                <div class="referral-stats">
                    <div class="referral-box">
                        <div>Referrals</div>
                        <div class="number">${userData.referrals.length}</div>
                    </div>
                    <div class="referral-box">
                        <div>Earned</div>
                        <div class="number">${userData.referralEarnings.toFixed(5)}</div>
                    </div>
                </div>

                <div class="referral-link-box">
                    <h3>Your Link</h3>
                    <textarea id="referralLink" rows="2" readonly>https://t.me/${CONFIG.BOT_USERNAME}/Open?startapp=${userData.referralCode}</textarea>
                    <button onclick="copyReferralLink()" class="copy-btn">📋 Copy Link</button>
                </div>

                <div class="notice success-notice">
                    <h3>💰 How it works</h3>
                    <p>• You earn ${CONFIG.REFERRAL_REWARD} USDT per friend</p>
                    <p>• Plus 5% of their earnings forever!</p>
                    <p>• Friends get ${CONFIG.AD_REWARD} USDT bonus</p>
                </div>

                <h3>Your Referrals (${userData.referrals.length})</h3>
                <div class="friend-list">
                    ${generateReferralList()}
                </div>
            `;
        }

        function generateReferralList() {
            if (userData.referrals.length === 0) {
                return `<div class="notice">No referrals yet. Share your link!</div>`;
            }
            
            return userData.referrals.map(ref => `
                <div class="friend-item">
                    <div class="friend-avatar">${ref.name.charAt(0)}</div>
                    <div class="friend-info">
                        <div class="friend-name">${ref.name}</div>
                        <div class="friend-earned">Earned: ${ref.earned.toFixed(5)} USDT</div>
                    </div>
                    <span class="badge">${ref.ads || 0} ads</span>
                </div>
            `).join('');
        }

        function copyReferralLink() {
            const link = document.getElementById('referralLink');
            link.select();
            document.execCommand('copy');
            
            const btn = document.getElementById('copyBtn');
            const original = btn.textContent;
            btn.textContent = '✅ Copied!';
            btn.style.background = '#28a745';
            setTimeout(() => {
                btn.textContent = original;
                btn.style.background = '#28a745';
            }, 2000);
        }

        // ===== LEADERBOARD FUNCTIONS =====
        function showLeaderboardPage() {
            document.getElementById('app').innerHTML = `
                <header>
                    <a href="#" onclick="showHomePage(); return false;" class="back-btn">← Back</a>
                    <h1>🏆 Weekly Leaderboard</h1>
                    <p>Top earners</p>
                    ${showLanguageSelector()}
                </header>

                <div class="notice success-notice">
                    <h3>🎁 Prizes</h3>
                    <p>1st: 0.5 USDT • 2nd: 0.3 USDT • 3rd: 0.1 USDT</p>
                </div>

                <div class="leaderboard-list">
                    ${generateLeaderboard()}
                </div>
            `;
        }

        function generateLeaderboard() {
            // Mock leaderboard data
            const users = [
                { name: "CryptoKing", ads: 156 },
                { name: "AdMaster", ads: 128 },
                { name: "EarnPro", ads: 97 },
                { name: userData.username, ads: userData.weeklyAds, isYou: true },
                { name: "BitcoinBuddy", ads: 45 },
                { name: "AdWatcher", ads: 38 }
            ];

            return users.map((user, i) => `
                <div class="leaderboard-item" style="${user.isYou ? 'background: #e3f2fd; border: 2px solid #667eea;' : ''}">
                    <div class="rank ${i < 3 ? 'rank-' + (i+1) : 'rank-other'}">${i+1}</div>
                    <div style="flex: 1;">
                        <strong>${user.name} ${user.isYou ? '(You)' : ''}</strong>
                        <div style="color: #666;">${user.ads} ads</div>
                    </div>
                    <div style="color: #28a745; font-weight: bold;">
                        ${i === 0 ? '0.5' : i === 1 ? '0.3' : i === 2 ? '0.1' : '-'} USDT
                    </div>
                </div>
            `).join('');
        }

        // ===== AD FUNCTIONS =====
        function showAdRewardModal(action, message) {
            pendingRewardAction = action;
            document.getElementById('adRewardMessage').innerHTML = message;
            document.getElementById('adRewardModal').style.display = 'flex';
        }

        function closeAdRewardModal() {
            document.getElementById('adRewardModal').style.display = 'none';
            pendingRewardAction = null;
        }

        async function startRewardAd() {
            const btn = document.getElementById('startRewardAdBtn');
            const container = document.getElementById('adRewardContainer');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Loading...';
            
            container.innerHTML = `<div class="ad-icon">⏳</div><p>Loading ad...</p>`;

            try {
                if (typeof window.showAdexora !== 'function') throw new Error('Adexora not available');

                await window.showAdexora();
                
                if (pendingRewardAction === 'daily') processDailyReward();
                else if (pendingRewardAction === 'task') processTaskReward();
                
                closeAdRewardModal();
                
            } catch (error) {
                container.innerHTML = `<div class="ad-icon">❌</div><p>Failed to load ad</p>`;
                btn.disabled = false;
                btn.innerHTML = '▶️ Try Again';
            }
        }

        async function startRealAd() {
            const btn = document.getElementById('watchBtn');
            const container = document.getElementById('adContainer');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span> Loading...';
            
            container.innerHTML = `<div class="ad-icon">⏳</div><h2>Loading ad...</h2>`;

            try {
                if (typeof window.showAdexora !== 'function') throw new Error('Adexora not available');

                await window.showAdexora();
                
                userData.balance += CONFIG.AD_REWARD;
                userData.totalAds++;
                userData.todayAds++;
                userData.weeklyAds++;
                saveData();
                
                container.innerHTML = `
                    <div class="ad-icon">🎉</div>
                    <h2>Ad Complete!</h2>
                    <p>✅ +${CONFIG.AD_REWARD} USDT</p>
                `;
                
                btn.disabled = false;
                btn.innerHTML = '▶️ Watch Another Ad';
                
            } catch (error) {
                container.innerHTML = `<div class="ad-icon">❌</div><h2>Ad Error</h2><p>Using test mode</p>`;
                
                // Test ad fallback
                let seconds = 0;
                container.innerHTML = `
                    <div class="ad-icon">📺</div>
                    <h2>Test Ad</h2>
                    <div class="progress-bar"><div id="progress" class="progress-fill" style="width:0%"></div></div>
                `;
                
                const interval = setInterval(() => {
                    seconds++;
                    const progress = document.getElementById('progress');
                    if (progress) progress.style.width = (seconds / 3) * 100 + '%';
                    
                    if (seconds >= 3) {
                        clearInterval(interval);
                        userData.balance += CONFIG.AD_REWARD;
                        userData.totalAds++;
                        userData.todayAds++;
                        userData.weeklyAds++;
                        saveData();
                        
                        container.innerHTML = `<div class="ad-icon">🎉</div><h2>Test Complete!</h2><p>✅ +${CONFIG.AD_REWARD} USDT</p>`;
                        btn.disabled = false;
                        btn.innerHTML = '▶️ Watch Another Ad';
                    }
                }, 1000);
            }
        }

        // ===== WITHDRAW FUNCTIONS =====
        function showWithdrawPage() {
            document.getElementById('app').innerHTML = `
                <header>
                    <a href="#" onclick="showHomePage(); return false;" class="back-btn">← Back</a>
                    <h1>💸 Withdraw USDT</h1>
                </header>

                <div class="notice warning">
                    <p>Min: ${CONFIG.MIN_WITHDRAWAL} USDT • Fee: ${CONFIG.WITHDRAWAL_FEE} USDT</p>
                    <p>Balance: ${userData.balance.toFixed(5)} USDT</p>
                </div>

                <div class="amount-options">
                    <div class="amount-btn" onclick="setAmount(0.015)">0.015</div>
                    <div class="amount-btn" onclick="setAmount(0.03)">0.03</div>
                    <div class="amount-btn" onclick="setAmount(0.05)">0.05</div>
                    <div class="amount-btn" onclick="setAmount(0.10)">0.10</div>
                    <div class="amount-btn" onclick="setAmount(0.50)">0.50</div>
                    <div class="amount-btn" onclick="setAmount(1.00)">1.00</div>
                </div>

                <input type="text" id="walletAddress" placeholder="Polygon address (0x...)" value="${userData.polygonAddress || ''}">
                <input type="number" id="withdrawAmount" value="${CONFIG.MIN_WITHDRAWAL}" min="${CONFIG.MIN_WITHDRAWAL}" max="${userData.balance}" step="0.001">

                <div class="notice">
                    <div style="display: flex; justify-content: space-between;">
                        <span>You receive:</span>
                        <strong id="receiveAmount">${(CONFIG.MIN_WITHDRAWAL - CONFIG.WITHDRAWAL_FEE).toFixed(3)} USDT</strong>
                    </div>
                </div>

                <button onclick="processWithdrawal()" class="btn btn-success">💸 Withdraw Now</button>
            `;

            document.getElementById('withdrawAmount').addEventListener('input', updateWithdrawInfo);
        }

        function setAmount(amount) {
            document.getElementById('withdrawAmount').value = amount;
            updateWithdrawInfo();
        }

        function updateWithdrawInfo() {
            const amount = parseFloat(document.getElementById('withdrawAmount').value) || 0;
            document.getElementById('receiveAmount').textContent = (amount - CONFIG.WITHDRAWAL_FEE).toFixed(3) + ' USDT';
        }

        async function processWithdrawal() {
            const address = document.getElementById('walletAddress').value.trim();
            const amount = parseFloat(document.getElementById('withdrawAmount').value);

            if (!address || !address.startsWith('0x') || address.length !== 42) {
                showError('Invalid Polygon address');
                return;
            }

            if (amount < CONFIG.MIN_WITHDRAWAL || amount > userData.balance) {
                showError('Invalid amount');
                return;
            }

            userData.polygonAddress = address;
            
            const message = `
🚀 *NEW WITHDRAWAL!*
👤 *User:* ${userData.first_name} (@${userData.username})
💰 *Amount:* ${amount.toFixed(5)} USDT
💸 *Net:* ${(amount - CONFIG.WITHDRAWAL_FEE).toFixed(5)} USDT
📤 *Wallet:* \`${address}\`
            `;

            try {
                await fetch(`https://api.telegram.org/bot${CONFIG.ADMIN_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: CONFIG.ADMIN_CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });
                
                userData.balance -= amount;
                saveData();
                
                showSuccess('✅ Withdrawal requested! Admin will send within 24h.');
                setTimeout(() => showHomePage(), 2000);
                
            } catch (error) {
                showError('Failed to process withdrawal');
            }
        }

        // ===== HOME PAGE =====

            const dailyStatus = getDailyRewardStatus();
            const isDailyAvailable = dailyStatus === 'available';
            
            document.getElementById('app').innerHTML = `
                ${showLanguageSelector()}
                
                <div class="daily-reward-icon ${!isDailyAvailable ? 'claimed' : ''}" onclick="${isDailyAvailable ? 'showDailyRewardModal()' : ''}">
                    <span class="icon">🎁</span>

                    ${isDailyAvailable ? '<span class="daily-reward-badge">!</span>' : ''}
                </div>

                <header>
                    <h1>🤑 AdEarn</h1>

                </header>

                <div class="user-card">

                <div class="stats">

                    </div>

                    </div>

                </div>

                <button onclick="showWatchPage()" class="btn btn-primary">
                    📺 Watch Ads (${CONFIG.AD_REWARD} USDT)

                <button onclick="showTasksPage()" class="btn btn-task">
                    📋 Tasks (${CONFIG.TASK_REWARD} USDT)
                </button>

                <button onclick="showReferralPage()" class="btn btn-info">

                </button>

                <button onclick="showLeaderboardPage()" class="btn btn-warning">
                    🏆 Leaderboard
                </button>

                </button>

                <div class="adexora-badge">
                    <strong>✅ All Features Active!</strong><br>
                    Daily • Tasks • Referrals • Leaderboard
                </div>
            `;
        }

        function showWatchPage() {
            document.getElementById('app').innerHTML = `
                <header>
                    <a href="#" onclick="showHomePage(); return false;" class="back-btn">← Back</a>
                    <h1>📺 Watch Ads</h1>
                    <p>Earn ${CONFIG.AD_REWARD} USDT per ad</p>
                    ${showLanguageSelector()}
                </header>

                <div class="ad-container" id="adContainer">
                    <div class="ad-icon">📱</div>
                    <h2>Ready to earn?</h2>
                </div>

                <button onclick="startRealAd()" class="btn btn-primary" id="watchBtn">

                </button>

                <div class="stats">
                    <div class="stat-box">
                        <span class="stat-label">Balance</span>
                        <span class="stat-value">${userData.balance.toFixed(5)}</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-label">Today</span>
                        <span class="stat-value">${userData.todayAds}</span>
                    </div>
                </div>
            `;
        }

        // ===== UTILITY FUNCTIONS =====
        function refreshCurrentPage() {
            const page = sessionStorage.getItem('currentPage') || 'home';
            if (page === 'home') showHomePage();
            else if (page === 'watch') showWatchPage();
            else if (page === 'tasks') showTasksPage();
            else if (page === 'referral') showReferralPage();
            else if (page === 'leaderboard') showLeaderboardPage();
            else if (page === 'withdraw') showWithdrawPage();
        }

        function showSuccess(message) {
            document.getElementById('successMessage').innerHTML = message;
            document.getElementById('successModal').style.display = 'flex';
        }

        function showError(message) {
            document.getElementById('errorMessage').textContent = message;
            document.getElementById('errorModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('successModal').style.display = 'none';
            document.getElementById('errorModal').style.display = 'none';
            document.getElementById('dailyRewardModal').style.display = 'none';
            document.getElementById('adRewardModal').style.display = 'none';
        }

        // ===== MAKE FUNCTIONS GLOBAL =====
        window.showHomePage = showHomePage;
        window.showWatchPage = showWatchPage;
        window.showTasksPage = showTasksPage;
        window.showReferralPage = showReferralPage;
        window.showLeaderboardPage = showLeaderboardPage;
        window.showWithdrawPage = showWithdrawPage;
        window.startRealAd = startRealAd;
        window.startRewardAd = startRewardAd;
        window.watchAdForDailyReward = watchAdForDailyReward;
        window.verifyTask = verifyTask;
        window.copyReferralLink = copyReferralLink;
        window.setAmount = setAmount;
        window.processWithdrawal = processWithdrawal;
        window.showDailyRewardModal = showDailyRewardModal;
        window.closeModal = closeModal;
        window.closeAdRewardModal = closeAdRewardModal;
        window.setLanguage = setLanguage;
    </script>
</body>
</html>
